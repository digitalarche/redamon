# Real shared cache in front of the vulnerable origin.
#
# The cache key is URL-ONLY (scheme + method + host + request_uri). request_uri
# includes the query string, so the WCP module's ?rdmncb=<token> cache-buster
# isolates every test into its own slot. The poison headers (X-Forwarded-Host,
# X-Forwarded-Proto, ...) are NOT in the key -> they are UNKEYED. The origin still
# trusts them -> classic web cache poisoning.
#
# Whether a given response is cached is decided by the ORIGIN's Cache-Control
# (response headers have higher priority than proxy_cache_valid in nginx), so each
# backend endpoint controls its own cacheability:
#   - "public, max-age=60"  -> cached (poisonable)
#   - "no-store" / "private" -> NOT cached (negative controls)

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=wcp:10m max_size=200m inactive=300s;

upstream origin {
    server backend:5000;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;

    # URL-only key shared by every location (overridden where noted).
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # --- SILENT CACHE -------------------------------------------------------
    # No cache-status headers exposed at all. nginx still caches (forced) and, on a
    # HIT, replays the stored response WITH its original Date, so the body and the
    # Date are frozen across requests. Only the behavioural (frozen-Date) oracle can
    # detect this -> exercises oracle.py's silent-cache fallback.
    location /silent/ {
        proxy_pass http://origin;
        proxy_cache wcp;
        proxy_cache_valid 200 60s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        # NO "X-Cache-Status" header here -> the cache is silent.
    }

    # --- NEGATIVE CONTROL: KEYED HEADER ------------------------------------
    # The unkeyed-looking header is folded INTO the cache key, so a poisoned entry
    # is stored under a key that includes the attacker's value and is never served
    # to a header-less victim. The module must score this REJECTED.
    location = /safe/keyed-xfh {
        proxy_pass http://origin;
        proxy_cache wcp;
        proxy_cache_key "$scheme$request_method$host$request_uri|xfh=$http_x_forwarded_host";
        proxy_cache_valid 200 301 302 403 500 503 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # --- PARAMETER CLOAKING --------------------------------------------------
    # The cache key is path + ONLY the rdmncb buster arg; utm_source is excluded from
    # the key (a real "marketing param stripped from the cache key" config) but the
    # origin still reflects it -> unkeyed query parameter poisoning.
    location = /poison/param-cloak {
        proxy_pass http://origin;
        proxy_cache wcp;
        proxy_cache_key "$scheme$request_method$host$uri|cb=$arg_rdmncb";
        proxy_cache_valid 200 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # --- EVERYTHING ELSE: normal URL-keyed shared cache --------------------
    location / {
        proxy_pass http://origin;
        proxy_cache wcp;
        proxy_cache_valid 200 301 302 403 500 503 60s;
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
